[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/r/:code"
  to = "/app/cadastro.html?ref=:code"
  status = 302

# JS/CSS mudam a cada correção de bug e o nome do arquivo nunca muda,
# então cache longo (principalmente "immutable") deixa gente presa numa
# versão antiga por semanas/meses sem perceber. 1h + revalidação: ainda
# ganha velocidade em navegações dentro do site, mas pega correção nova
# rápido.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Imagens raramente mudam (e quando mudam, quase sempre é upload de nome
# novo) — cache longo aqui é seguro.
[[headers]]
  for = "/imagens_alemao/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: cache curto com revalidação, pra correção de bug chegar em minutos
# pra quem já visitou o site, em vez de até 30 dias depois.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
