<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verbo — DeutschBloom</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    table.conj { width:100%; border-collapse:collapse; margin-top:10px; }
    table.conj th, table.conj td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border-light); font-size:.9rem; }
    table.conj th { color:var(--text-secondary); font-size:.8rem; text-transform:uppercase; }
  </style>
</head>
<body>
  <div id="app-nav"></div>
  <div class="container" style="padding-top:28px; max-width:760px;">
    <a href="cursos.html" class="muted">← Voltar para Cursos</a>
    <div class="card" id="content" style="margin-top:14px;">Carregando...</div>
  </div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/sfx.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/xp.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/i18n.js?v=20260714-ui8"></script>
  <script src="../assets/js/data.js?v=20260714-audio1"></script>
  <script src="../assets/js/saved_r2.js"></script>
  <script>
    // Visitante pode ver (bloqueio acontece nas listagens)
    renderNav("cursos");

    const params = new URLSearchParams(location.search);
    const id = Number(params.get("id"));
    const nivelParam = params.get("nivel");
    const itemKey = `verb-${id}`;
    const TENSE_LABEL = { passado: "Passado", presente: "Presente", futuro: "Futuro" };
    const PRONOUN_LABEL = { ich: "ich", du: "du", er_sie_es: "er/sie/es", wir: "wir", ihr: "ihr", sie: "sie" };
    const PRONOUN_ORDER = ["ich", "du", "er_sie_es", "wir", "ihr", "sie"];

    // Mesmo modelo dos diálogos: um único contexto controla o áudio do verbo
    // e todas as frases, reaplicando a velocidade depois de cada troca de URL.
    const verbAudioCtx = { player: new Audio(), speed: 0.75, path: "", button: null };
    verbAudioCtx.player.dataset.afbSpeedPlayer = "true";

    function updateVerbSpeeds(speed) {
      verbAudioCtx.speed = speed;
      verbAudioCtx.player.defaultPlaybackRate = speed;
      verbAudioCtx.player.playbackRate = speed;
      document.querySelectorAll("[data-verb-speed]").forEach((button) => {
        button.classList.toggle("active", parseFloat(button.dataset.verbSpeed) === speed);
      });
    }

    function renderVerbSpeedControl(level) {
      const container = document.getElementById("speed-control");
      if (!container) return;
      const initial = (level === "A1" || level === "A2") ? 0.75 : 1.0;
      container.innerHTML = [0.5, 0.75, 1.0].map((speed) =>
        `<button type="button" class="btn-speed${speed === initial ? " active" : ""}" data-verb-speed="${speed}" onclick="updateVerbSpeeds(${speed})">${speed}x</button>`
      ).join("");
      updateVerbSpeeds(initial);
    }

    async function resolveVerbAudioUrl(path) {
      if (!path) return null;
      if (/^https?:\/\//i.test(path)) return path;
      // O verbo avulso usa o nome correto no R2; a tabela antiga do Supabase
      // pode apontar para outro arquivo. Preserve R2 como fonte principal.
      return `${AFB_R2_PUBLIC_URL}/${String(path).replace(/^\/+/, "")}`;
    }

    async function playVerbAudio(path, button) {
      if (!path) return;
      const player = verbAudioCtx.player;
      if (verbAudioCtx.path === path && !player.paused) {
        player.pause();
        player.currentTime = 0;
        return;
      }
      if (verbAudioCtx.button && verbAudioCtx.button !== button) verbAudioCtx.button.textContent = "▶";
      button.textContent = "⏳";
      const url = await resolveVerbAudioUrl(path);
      if (!url) { button.textContent = "⚠️"; return; }
      verbAudioCtx.path = path;
      verbAudioCtx.button = button;
      let triedSupabase = false;
      player.src = url;
      updateVerbSpeeds(verbAudioCtx.speed);
      player.onloadedmetadata = () => updateVerbSpeeds(verbAudioCtx.speed);
      player.oncanplay = () => { updateVerbSpeeds(verbAudioCtx.speed); button.textContent = "⏸"; };
      player.onplay = () => { updateVerbSpeeds(verbAudioCtx.speed); button.textContent = "⏸"; };
      player.onpause = () => { button.textContent = "▶"; };
      player.onended = () => { button.textContent = "▶"; verbAudioCtx.button = null; };
      player.onerror = async () => {
        if (!triedSupabase && !/^https?:\/\//i.test(path)) {
          triedSupabase = true;
          const signed = await AFBData.signedAudioUrl(path).catch(() => null);
          if (signed) {
            player.src = signed;
            updateVerbSpeeds(verbAudioCtx.speed);
            try { await player.play(); return; } catch {}
          }
        }
        button.textContent = "⚠️";
        verbAudioCtx.button = null;
      };
      try { await player.play(); } catch { button.textContent = "⚠️"; }
    }

    // Atualiza ao vivo somente os audios das frases. O audio do verbo avulso
    // permanece no JSON/R2: o valor antigo de cursos_verbs.audio_url no
    // Supabase usa outro nome de arquivo e quebrava verbos como "sein".
    async function refreshAudioFromSupabase(verb) {
      try {
        const headers = { apikey: AFB_SUPABASE_ANON_KEY, Authorization: `Bearer ${AFB_SUPABASE_ANON_KEY}` };
        if (verb.examples && verb.examples.length) {
          const exRes = await fetch(`${AFB_SUPABASE_URL}/rest/v1/cursos_verb_examples?verb_id=eq.${verb.id}&select=id,audio_url`, { headers });
          if (exRes.ok) {
            const rows = await exRes.json();
            const byId = {};
            rows.forEach((r) => { byId[r.id] = r.audio_url; });
            verb.examples.forEach((ex) => { if (byId[ex.id]) ex.audio_url = byId[ex.id]; });
          }
        }
      } catch (e) {}
    }

    (async () => {
      let verb = null;
      if (nivelParam) {
        const verbs = await AFBData.verbos(nivelParam);
        verb = verbs.find((v) => v.id === id) || null;
      }
      if (!verb) {
        const found = await AFBData.findAcrossLevels("verb", id);
        verb = found ? found.item : null;
      }
      const el = document.getElementById("content");
      if (!verb) { el.innerHTML = "<p>Verbo não encontrado.</p>"; return; }

      // Somente as frases consultam o Supabase. O verbo avulso conserva o
      // audio_url carregado do JSON/R2.
      await refreshAudioFromSupabase(verb);

      const done = Progress.isCompleted(itemKey);
      const hasExamples = verb.examples.length > 0;
      const nivelFound = nivelParam || "A1";
      const verbType = verb.verb_type && verb.verb_type !== "None" ? verb.verb_type : "verbo";

      function tenseTable(tense) {
        const rows = verb.examples
          .filter((e) => e.tense === tense)
          .sort((a, b) => PRONOUN_ORDER.indexOf(a.pronoun) - PRONOUN_ORDER.indexOf(b.pronoun));
        if (!rows.length) return "";
        return `
          <h4 style="margin:18px 0 4px;">${TENSE_LABEL[tense]}</h4>
          <table class="conj">
            <tr><th>Pronome</th><th>Conjugação</th><th>Exemplo</th><th></th><th></th></tr>
            ${rows.map((r, idx) => `
              <tr>
                <td>${PRONOUN_LABEL[r.pronoun]}</td>
                <td><b>${r.conjugated_verb}</b></td>
                <td>${r.example_sentence_german}<br><span class="muted" style="font-size:.82rem;">${I18n.field(r, 'example_sentence_portuguese')}</span></td>
                <td>${r.audio_url ? `<button class="btn btn-ghost btn-sm" onclick="playVerbAudio('${r.audio_url}', this)">▶</button>` : ""}</td>
                <td id="save-ex-${r.id}"></td>
              </tr>`).join("")}
          </table>`;
      }

      el.innerHTML = `
        <div class="flex-between" style="align-items:center;">
          <div style="display:flex;align-items:center;gap:10px;">
            <h2 style="margin:0;">${verb.base_verb}</h2>
            ${verb.audio_url ? `<button class="btn btn-ghost btn-sm" onclick="playVerbAudio('${verb.audio_url}', this)" title="Ouvir pronúncia">▶</button>` : ""}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="verb-save-btn"></span>
            ${done ? '<span class="badge">✅ Concluído</span>' : hasExamples ? `<span class="xp-pill">+${verb.xp_reward} XP</span>` : '<span class="badge">em breve</span>'}
          </div>
        </div>
        <p class="muted">${I18n.field(verb, 'portuguese_translation')} · <span class="verb-type">${verbType}</span></p>
        <div class="afb-speed-row"><span class="afb-speed-label">Velocidade do áudio:</span><span id="speed-control"></span></div>

        ${hasExamples
          ? ["passado", "presente", "futuro"].map(tenseTable).join("")
          : `<p class="muted center" style="padding:30px 0;">As conjugações completas deste verbo ainda estão sendo adicionadas 🚧</p>`}

        ${hasExamples ? `
          <button class="btn btn-primary btn-block" id="complete-btn" style="margin-top:24px;" ${done ? "disabled" : ""}>
            ${done ? "Já concluído" : `Marcar como estudado (+${verb.xp_reward} XP)`}
          </button>` : ""}
      `;

      renderVerbSpeedControl(nivelFound);

      // Botão de salvar o verbo
      const verbSaveContainer = document.getElementById("verb-save-btn");
      if (verbSaveContainer) {
        const saveBtn = SavedItems.createSaveButton({
          type: "verb", id: verb.id, parentId: null, nivel: nivelFound,
          title: verb.base_verb + " - " + (verb.portuguese_translation || "")
        });
        verbSaveContainer.appendChild(saveBtn);
      }

      // Botões de salvar cada exemplo
      verb.examples.forEach((ex) => {
        const td = document.getElementById(`save-ex-${ex.id}`);
        if (td) {
          const saveBtn = SavedItems.createSaveButton({
            type: "verb_example", id: ex.id, parentId: verb.id, nivel: nivelFound,
            title: ex.conjugated_verb + " - " + ex.example_sentence_german.substring(0, 40)
          });
          td.appendChild(saveBtn);
        }
      });

      const btn = document.getElementById("complete-btn");
      if (btn && !done) {
        btn.addEventListener("click", () => {
          const result = Progress.complete(itemKey, verb.xp_reward);
          if (result.leveledUp) alert(`🎉 Parabéns! Você subiu para o nível ${result.newLevel}!`);
          window.location.reload();
        });
      }
    })();
  </script>
</body>
</html>
