<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — DeutschBloom</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="navbar">
    <a class="brand" href="../index.html">🇩🇪 DeutschBloom</a>
    <nav></nav>
    <div class="nav-right"><a class="btn btn-outline btn-sm" href="login.html">Entrar</a></div>
  </header>

  <div class="card form-card">
    <h2 class="center">Criar sua conta</h2>
    <p class="center muted">Grátis, leva menos de 1 minuto.</p>
    <div class="form-error" id="err"></div>
    <form id="signup-form">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Senha (mín. 6 caracteres)</label>
        <input type="password" id="password" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" id="password2" required minlength="6">
      </div>
      <button class="btn btn-primary btn-block" type="submit">Criar conta</button>
    </form>
    <p class="form-footer">Já tem conta? <a href="login.html"><b>Entrar</b></a></p>
  </div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/sfx.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    Auth.redirectIfLoggedIn();
    const referralCode = new URLSearchParams(location.search).get("ref");
    if (referralCode) localStorage.setItem("afb_pending_referral", referralCode.toUpperCase());
    var form=document.getElementById("signup-form"),err=document.getElementById("err");
    form.addEventListener("submit", function(e){
      e.preventDefault();err.classList.remove("show");
      var name=document.getElementById("name").value;
      var email=document.getElementById("email").value;
      var pw=document.getElementById("password").value;
      var pw2=document.getElementById("password2").value;
      if(!name||!email||!pw){err.textContent="Preencha todos os campos.";err.classList.add("show");return}
      if(pw.length<6){err.textContent="Senha precisa ter pelo menos 6 caracteres.";err.classList.add("show");return}
      if(pw!==pw2){err.textContent="Senhas nao conferem.";err.classList.add("show");return}
      const plano = new URLSearchParams(location.search).get("plano");
      Auth.signup({name:name,email:email,password:pw}).then(function(r){
        if(!r.ok){err.textContent=r.error;err.classList.add("show");return}
        if(r.session){
          const next = new URLSearchParams(location.search).get("next");
          if (next && !next.includes(":") && !next.startsWith("//")) {
            window.location.href = next;
          } else if (plano) {
            window.location.href = "planos.html?auto=" + plano;
          } else {
            window.location.href = "dashboard.html";
          }
        } else {
          err.textContent="Conta criada! Verifique seu email para ativar.";
          err.style.background="var(--color-success, #4CAF50)";
          err.classList.add("show");
        }
      });
    });
  </script>
</body>
</html>
