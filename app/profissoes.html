<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="../assets/js/analytics.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profissões — DeutschBloom</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .search-bar {
      width: 100%; padding: 14px 20px; border-radius: 999px;
      border: 2px solid var(--border-light); font-size: 1rem; margin-bottom: 16px;
      background: var(--card-bg);
    }
    .search-bar:focus { outline: none; border-color: var(--color-primary); }
    .cat-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .cat-chip {
      padding: 8px 16px; border-radius: 999px; border: 2px solid var(--border-light);
      background: var(--card-bg); cursor: pointer; font-size: .85rem; font-weight: 600;
      transition: .2s; white-space: nowrap;
    }
    .cat-chip:hover { border-color: var(--color-primary); }
    .cat-chip.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .prof-card {
      background: var(--card-bg); border-radius: var(--radius); padding: 18px 20px;
      margin-bottom: 10px; border-left: 4px solid var(--color-primary);
      transition: .2s; cursor: pointer; position: relative;
    }
    .prof-card:hover { transform: translateX(4px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .prof-card .german { font-size: 1.2rem; font-weight: 700; }
    .prof-card .portuguese { font-size: 1rem; color: var(--text-secondary); margin-top: 2px; }
    .prof-card .meta { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .prof-card .level-badge { padding: 2px 10px; border-radius: 999px; font-size: .72rem; font-weight: 800; color: #fff; }
    .prof-card .tag { padding: 2px 8px; border-radius: 999px; font-size: .72rem; background: var(--bg-secondary); color: var(--text-secondary); }
    .prof-card .phrases { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-light); display: none; }
    .prof-card.expanded .phrases { display: block; }
    .prof-card .phrase-de { font-size: .9rem; font-weight: 600; margin-top: 6px; }
    .prof-card .phrase-pt { font-size: .85rem; color: var(--text-secondary); }
    .prof-card .phrase-level { font-size: .7rem; padding: 1px 6px; border-radius: 4px; background: var(--bg-secondary); color: var(--text-secondary); margin-left: 6px; }
    .btn-audio { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--color-primary); color: #fff; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-audio:hover { opacity: .85; }
    .btn-audio-sm { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--color-primary); color: #fff; cursor: pointer; font-size: .7rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-audio-sm:hover { opacity: .85; }
    .counter { font-size: .85rem; color: var(--text-secondary); margin-bottom: 10px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .back-link { cursor:pointer; color: var(--color-primary-dark); font-weight:600; font-size:.9rem; margin-bottom:12px; display:inline-block; }
    .back-link:hover { text-decoration: underline; }
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .cat-folder { background: var(--card-bg); border-radius: var(--radius); padding: 20px 16px; cursor: pointer; text-align: center; transition: .2s; border: 2px solid transparent; }
    .cat-folder:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); border-color: var(--color-primary); }
    .cat-folder .folder-icon { font-size: 2rem; margin-bottom: 8px; }
    .cat-folder .folder-name { font-weight: 700; font-size: .9rem; }
    .cat-folder .folder-count { font-size: .78rem; color: var(--text-secondary); margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <div class="container" style="padding-top:28px; max-width:900px;">
    <div class="afb-speed-row"><span class="afb-speed-label">Velocidade do áudio:</span><span id="speed-control"></span></div>
    <div id="main-view">
      <h2 class="mt-0">💼 Profissões em Alemão</h2>
      <p class="muted" id="prof-intro">Aprenda alemão no contexto do trabalho — 4.500 frases reais de 90 profissões, do A1 ao C2.</p>

      <input type="text" class="search-bar" id="search-main" placeholder="🔍 Buscar em todas as profissões...">
      <div class="counter" id="counter-main" style="margin-bottom:16px;"></div>
      <div class="cat-grid" id="cat-grid"></div>
      <div id="list-main"></div>
    </div>

    <div id="cat-view" style="display:none;">
      <span class="back-link" onclick="voltar()">← Voltar para categorias</span>
      <h2 class="mt-0" id="cat-title"></h2>
      <input type="text" class="search-bar" id="search-cat" placeholder="🔍 Buscar nesta categoria...">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div class="counter" id="counter-cat" style="margin-bottom:0;"></div>
      </div>
      <div id="list-cat"></div>
    </div>

    <div id="prof-view" style="display:none;">
      <span class="back-link" onclick="voltarProf()">← Voltar</span>
      <div id="prof-detail"></div>
    </div>
  </div>

  <div id="audio-player" style="display:none;"><audio id="audio-el"></audio></div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/sfx.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/i18n.js?v=20260714-ui8"></script>
  <script src="../assets/js/saved_r2.js?v=20260714-ref2"></script>
  <script src="../assets/js/guest.js"></script>
  <script src="../assets/js/content-freshness.js?v=20260714-1"></script>
  <script>
    renderNav("profissoes");
    afbRenderSpeedControl("speed-control");

    // Modo visitante: todas as profissões podem ser conhecidas; 10 frases em cada.
    let isGuest = true;
    let isLoggedIn = false;
    let guestFreeProfId = null;

    const audioEl = document.getElementById("audio-el");
    const R2 = (window.AFB_CONTENT_GATEWAY_URL || "https://deutschbloom-content-gateway.quesaco93.workers.dev") + "/";
    let allData = [];
    let activeCat = null;
    let activeProf = null;
    let searchMain = "";
    let searchCat = "";

    let catIcons = {
      "Alimentação": "🍽️", "Hotelaria e Turismo": "🏨",
      "Saúde": "🏥", "Transporte": "🚌"
    };
    const levelOrder = {A1:0, A2:1, B1:2, B2:3, C1:4, C2:5};
    const professionIntro = {
      pt:"Aprenda alemão no contexto do trabalho — 4.500 frases reais de 90 profissões, do A1 ao C2.",
      en:"Learn German in a work context — 4,500 real-life sentences from 90 professions, from A1 to C2.",
      es:"Aprende alemán en el contexto laboral — 4500 frases reales de 90 profesiones, del A1 al C2.",
      fr:"Apprenez l’allemand dans un contexte professionnel — 4 500 phrases authentiques issues de 90 métiers, du niveau A1 au C2.",
      it:"Impara il tedesco nel contesto lavorativo — 4.500 frasi reali di 90 professioni, dal livello A1 al C2.",
      tr:"İş bağlamında Almanca öğrenin — A1'den C2'ye 90 meslekten 4.500 gerçek cümle.",
      ar:"تعلّم الألمانية في سياق العمل — 4,500 جملة واقعية من 90 مهنة، من A1 إلى C2.",
      he:"למדו גרמנית בהקשר מקצועי — 4,500 משפטים אמיתיים מ־90 מקצועות, מרמה A1 עד C2.",
      hi:"कामकाजी संदर्भ में जर्मन सीखें — 90 पेशों के 4,500 वास्तविक वाक्य, A1 से C2 तक।",
      pl:"Ucz się niemieckiego w kontekście zawodowym — 4500 autentycznych zdań z 90 zawodów, od A1 do C2."
    };

    async function load() {
      try {
        let authHeaders = {};
        try { if (typeof Auth !== "undefined" && Auth.accessToken) { const t = await Auth.accessToken(); if (t) authHeaders = { Authorization: `Bearer ${t}` }; } } catch {}
        let r = await fetch(`${R2}data/profissoes.json`, { headers: authHeaders }).catch(() => null);
        if (!r || !r.ok) r = await fetch("../data/profissoes.json");
        allData = (await r.json()).expressions || [];
        const lang = I18n.getCurrent();
        if (lang !== "pt") {
          // O i18n busca o mapa no R2 primeiro e usa o arquivo do deploy apenas
          // como fallback. Traduz antes de renderizar sem tocar no alemão/áudio.
          const localeMap = await I18n.loadContentTranslations();
          localeMap[professionIntro.pt] = professionIntro[lang] || professionIntro.pt;
          if (Object.keys(localeMap).length) {
            const translate = value => {
              if (typeof value !== "string") return value;
              return localeMap[value.replace(/\s+/g, " ").trim()] || value;
            };
            catIcons = Object.fromEntries(Object.entries(catIcons).map(([name, icon]) => [translate(name), icon]));
            allData.forEach(item => {
              item.portuguese = translate(item.portuguese);
              item.profession = translate(item.profession);
              item.category = translate(item.category);
              if (Array.isArray(item.tags)) item.tags = item.tags.map(translate);
              (item.phrases || []).forEach(phrase => { phrase.pt = translate(phrase.pt); });
            });
            // A mesma versão completa traduz o título, subtítulo, contadores,
            // placeholders e textos dinâmicos observados pelo i18n global.
            I18n._contentTranslations = localeMap;
            I18n._translationPromise = Promise.resolve(localeMap);
            I18n.applyPageTranslations();
            document.getElementById("prof-intro").textContent = professionIntro[lang] || professionIntro.pt;
          }
        }
        if (allData.length) guestFreeProfId = allData[0].id;
        renderMain();
      } catch (e) {
        document.getElementById("cat-grid").innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>Em breve!</h3></div>';
      }
    }

    function voltar() {
      activeCat = null; activeProf = null; searchCat = "";
      document.getElementById("main-view").style.display = "";
      document.getElementById("cat-view").style.display = "none";
      document.getElementById("prof-view").style.display = "none";
      document.getElementById("search-cat").value = "";
      renderMain();
    }

    function voltarProf() {
      activeProf = null;
      document.getElementById("prof-view").style.display = "none";
      if (activeCat) {
        document.getElementById("cat-view").style.display = "";
        renderCat();
      } else {
        document.getElementById("main-view").style.display = "";
        renderMain();
      }
    }

    function renderMain() {
      const cats = new Set(allData.map(e => e.category));
      const counts = {};
      for (const c of cats) counts[c] = allData.filter(e => e.category === c).length;

      document.getElementById("cat-grid").innerHTML = [...cats].sort().map(c => `
        <div class="cat-folder" onclick="abrirCat('${c}')">
          <div class="folder-icon">${catIcons[c] || "📁"}</div>
          <div class="folder-name">${c} ${ContentFreshness.badgeAny(allData.filter(e=>e.category===c))}</div>
          <div class="folder-count">${counts[c]} profissões</div>
        </div>
      `).join("");

      let filtradas = allData;
      if (searchMain) {
        filtradas = filtrar(filtradas, searchMain);
      }
      document.getElementById("counter-main").innerHTML = searchMain
        ? `${filtradas.length} resultado(s)`
        : `<span style="background:var(--brand-light);color:var(--brand);padding:4px 12px;border-radius:20px;font-weight:700;">📚 ${allData.length} profissões · ${cats.size} categorias · ${allData.reduce((total, item) => total + (item.phrases || []).length, 0)} frases</span>`;
      document.getElementById("list-main").innerHTML = searchMain ? renderCards(filtradas) : "";
    }

    document.getElementById("search-main").addEventListener("input", (e) => {
      searchMain = e.target.value.toLowerCase().trim();
      renderMain();
    });

    function abrirCat(cat) {
      activeCat = cat;
      document.getElementById("main-view").style.display = "none";
      document.getElementById("cat-view").style.display = "";
      document.getElementById("prof-view").style.display = "none";
      document.getElementById("cat-title").textContent = (catIcons[cat] || "📁") + " " + cat;
      renderCat();
    }

    function renderCat() {
      const dados = allData.filter(e => e.category === activeCat);
      let filtradas = dados;
      if (searchCat) filtradas = filtrar(filtradas, searchCat);

      document.getElementById("counter-cat").textContent = `${filtradas.length} ${filtradas.length!==1?'profissões':'profissão'}`;
      document.getElementById("list-cat").innerHTML = filtradas.length ? renderCards(filtradas) : '<div class="empty-state"><p>Nenhuma encontrada.</p></div>';
    }

    document.getElementById("search-cat").addEventListener("input", (e) => {
      searchCat = e.target.value.toLowerCase().trim();
      renderCat();
    });

    function filtrar(lista, q) {
      return lista.filter(e => (e.german||"").toLowerCase().includes(q) || (e.portuguese||"").toLowerCase().includes(q) || (e.profession||"").toLowerCase().includes(q) || (e.category||"").toLowerCase().includes(q));
    }

    function renderCards(lista) {
      return lista.map((e,i) => {
        return `
        <div class="prof-card" id="prof-${i}">
          <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;" onclick="abrirProf(${i})">
            <div>
              <div class="german">👤 ${e.profession||""} ${ContentFreshness.badge(e)}</div>
              <div class="portuguese">${e.german||""}</div>
              <div class="meta">
                <span class="level-badge" style="background:${levelColor(e.level)}">${e.levels.sort().join(' · ')}</span>
                <span class="tag">${e.category||""}</span>
                <span class="tag">${(e.phrases||[]).length} frases</span>
              </div>
            </div>
            <span class="prof-save-btn-${i}"></span>
          </div>
        </div>`;
      }).join("");
    }

    function abrirProf(idx) {
      const e = allData.find(d => d.profession === document.querySelector(`#prof-${idx} .german`)?.textContent?.replace('👤 ','')) || allData[idx];
      if (!e) return;
      activeProf = e;
      document.getElementById("cat-view").style.display = "none";
      document.getElementById("main-view").style.display = "none";
      document.getElementById("prof-view").style.display = "";

      // Show all phrases grouped by level (visitante: 20 liberadas, resto com cadeado)
      const levels = ["A1","A2","B1","B2","C1","C2"];
      let phraseIdx = 0;
      let phrasesHtml = levels.map(lv => {
        const frases = (e.phrases||[]).filter(p => p.level === lv);
        if (!frases.length) return "";
        return `<h4 style="margin:16px 0 8px;color:${levelColor(lv)}">${lv}</h4>` +
          frases.map((f, fi) => {
            if (isGuest && phraseIdx++ >= AFB_FREE_PROF_PHRASES) {
              return Guest.lockedRowHidden(lv);
            }
            return `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin:4px 0;background:var(--bg-secondary);border-radius:8px;gap:8px;">
              <div style="flex:1">
                <div class="phrase-de">${f.de} ${ContentFreshness.badge(f)}</div>
                <div class="phrase-pt">${f.pt}</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;">
                ${f.audio_url ? `<button class="btn-audio-sm" onclick="event.stopPropagation();playAudio('${f.audio_url}',this)" title="Ouvir">▶</button>` : ''}
                <span class="prof-phrase-save-${idx}_${lv}_${fi}"></span>
              </div>
            </div>
          `;
          }).join("");
      }).join("");

      document.getElementById("prof-detail").innerHTML = `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">
          <div>
            <h2 style="margin:0;">👤 ${e.profession} ${ContentFreshness.badge(e)}</h2>
            <p class="muted" style="margin:4px 0;">${e.category} · ${(e.phrases||[]).length} frases · ${e.levels.sort().join(' → ')}</p>
          </div>
          <span id="prof-detail-save"></span>
        </div>
        ${phrasesHtml}
      `;

      // Save button for profession
      setTimeout(() => {
        const saveSpan = document.getElementById("prof-detail-save");
        if (saveSpan) saveSpan.appendChild(SavedItems.createSaveButton({
          type: "profession", id: String(e.id), nivel: e.level || "",
          title: e.profession, subtitle: e.german || "", audioUrl: e.audio_url || "", refUrl: window.location.href
        }));

        // Cada frase tambem vira uma referencia, como as frases de dialogo.
        // O ID combina profissao, nivel e posicao dentro daquele nivel.
        ["A1","A2","B1","B2","C1","C2"].forEach(lv => {
          (e.phrases||[]).filter(p => p.level === lv).forEach((phrase, fi) => {
            const slot = document.querySelector(`.prof-phrase-save-${idx}_${lv}_${fi}`);
            if (!slot || slot.children.length) return;
            slot.appendChild(SavedItems.createSaveButton({
              type: "profession_phrase", id: `${e.id}_${lv}_${fi}`, parentId: String(e.id), nivel: lv,
              title: phrase.de || "", subtitle: phrase.pt || "", audioUrl: phrase.audio_url || "",
              refUrl: window.location.href
            }));
          });
        });
      }, 50);
    }

    // Init save buttons after render
    function initSaveButtons() {
      const spans = document.querySelectorAll('[class*="prof-save-btn-"]');
      spans.forEach(span => {
        const match = span.className.match(/prof-save-btn-(\d+)/);
        if (!match) return;
        const i = parseInt(match[1]);
        const e = allData[i];
        if (!e || span.children.length > 0) return;
        span.appendChild(SavedItems.createSaveButton({
          type: "profession", id: String(e.id), nivel: e.level || "",
          title: e.profession, subtitle: e.german || "", audioUrl: e.audio_url || "", refUrl: window.location.href
        }));
      });
    }

    // Override renderCards to init save buttons
    const _renderCards = renderCards;
    renderCards = function(lista) {
      const html = _renderCards(lista);
      setTimeout(initSaveButtons, 50);
      return html;
    };

    function levelColor(lv) {
      const c={A1:"#4CAF50",A2:"#2196F3",B1:"#FF9800",B2:"#9C27B0",C1:"#E91E63",C2:"#607D8B"};
      return c[lv]||"#888";
    }

    async function playAudio(filename, btn) {
      if(!filename) return;
      afbPlayAudio(filename, btn);
    }

    Promise.all([Guest.check(), Guest.isFree()]).then(([notLoggedIn, free]) => {
      isLoggedIn = !notLoggedIn;
      isGuest = free;
      load();
    });
  </script>
</body>
</html>
