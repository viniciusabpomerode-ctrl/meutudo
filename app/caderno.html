function playAudio(audioPath, btn){
  if(!audioPath)return;
  if(ad.src&&ad.src.includes(audioPath)&&!ad.paused){ad.pause();btn.textContent="▶";return}
  btn.textContent="⏳";
  if(audioPath.startsWith("data:")||audioPath.startsWith("blob:")){
    ad.src=audioPath;ad.play().catch(()=>{});btn.textContent="⏸";
    ad.onended=()=>btn.textContent="▶";ad.onpause=()=>btn.textContent="▶";return;
  }
  // Tenta Supabase + R2 em paralelo (quem cair primeiro toca)
  const r2url=audioPath.startsWith("http")?audioPath:(R2+audioPath);
  AFBData.signedAudioUrl(audioPath).then(url=>{
    if(url&&(!ad.src||ad.paused)){ad.src=url;ad.play().catch(()=>{});btn.textContent="⏸"}
  }).catch(()=>{});
  // Fallback R2
  setTimeout(()=>{
    if(!ad.src||ad.paused){ad.src=r2url;ad.play().catch(()=>{})}
  },800);

  ad.onended=()=>btn.textContent="▶";
  ad.onpause=()=>btn.textContent="▶";
}
async function resolve(item){

        const request=indexedDB.open("afb_creativity_recs",1);
        request.onerror=()=>rejectRecording(request.error);

        if(item.type==="phrase"){const s=d.sentences?.find(x=>same(x.id,item.id));if(s){cache[ck]=result(s.german_text,s.portuguese_translation,s.audio_url,`dialogo.html?id=${d.id}&nivel=${item.nivel}`);return cache[ck]}}
        if(item.type==="word"){const v=d.vocabulary?.find(x=>same(x.id,item.id));if(v){cache[ck]=result(v.german_word,v.portuguese_translation,v.audio_url,`dialogo.html?id=${d.id}&nivel=${item.nivel}`);return cache[ck]}}
        if(item.type==="grammar"){const g=d.grammar_tips?.find(x=>same(x.id,item.id));if(g){cache[ck]=result(g.title,g.german_example,"",`dialogo.html?id=${d.id}&nivel=${item.nivel}`);return cache[ck]}}

function group(items){

  for(const i of items){const d=new Date(i.created_at),dk=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();let l;if(dk===t.getTime())l="Hoje";else if(dk===y.getTime())l="Ontem";else l=d.toLocaleDateString("pt-BR");if(!g[l])g[l]=[];g[l].push(i)}return g;

async function render(){

  if(!items.length){el.innerHTML='<div class="empty-state"><div class="big">📝</div><p>Nenhum item.</p><p class="muted">Salve frases clicando 💛!</p></div>';return}
  let resolved=await Promise.all(items.map(async i=>{const r=await resolve(i);return{...i,...r}}));
  if(query){const q=query.toLowerCase();resolved=resolved.filter(i=>(i.notes||"").toLowerCase().includes(q)||(i.title||"").toLowerCase().includes(q)||(i.sub||"").toLowerCase().includes(q))}
  if(!resolved.length){el.innerHTML='<div class="empty-state"><div class="big">🔍</div><p>Nenhum item encontrado.</p></div>';return}
  viewItems=resolved;resolved.forEach((i,n)=>i._viewIndex=n);
  const groups=group(resolved);let h="";
  for(const[lbl,gi]of Object.entries(groups)){h+=`<div class="day-group"><div class="day-header">${lbl}</div>`;
    for(const i of gi){const typeArg=JSON.stringify(i.type),idArg=JSON.stringify(String(i.id));h+=`<div class="saved-card"><div class="top" onclick="window.location='${i.link||"#"}'"><span class="icon">${ICONS[i.type]||"📌"}</span><div class="body"><div class="title">${i.title||"Sem título"}${i.reviewed_at?'<span class="review-tag">✅</span>':''}</div>${i.sub?`<div class="sub">${i.sub}</div>`:""}</div>${i.audio?`<button class="btn-sm" style="flex-shrink:0" onclick="event.stopPropagation();playAudio('${i.audio}',this)">▶</button>`:""}</div>${i.notes?`<div class="notes">📝 ${i.notes}</div>`:""}<div class="actions"><button class="btn-sm" onclick="editNotes(${typeArg},${idArg},'${(i.notes||"").replace(/'/g,"\\'")}')">✏️ ${i.notes?'Editar':'Anotar'}</button><button class="btn-sm" onclick="review(${typeArg},${idArg})">✅</button><button class="btn-sm report-btn" title="${notebookText('reportTitle')}" onclick="reportItem(${i._viewIndex})">❗ ${notebookText('report')}</button><button class="btn-sm" style="color:#f44;border-color:transparent" onclick="del(${typeArg},${idArg})">🗑️</button></div></div>`}h+="</div>"}
  el.innerHTML=h;
}
async function load(){all=await SavedItems.getAll();render()}
async function editNotes(t,id,cur){const n=prompt(notebookText("notes"),cur==="undefined"?"":cur);if(n!==null){await SavedItems.updateNotes(t,id,n);load()}}
async function review(t,id){await SavedItems.markReviewed(t,id);try{Progress.complete(`saved-${t}-${id}`,0)}catch(e){}load()}
async function reportItem(index){const i=viewItems[index];if(!i)return;const message=prompt(notebookText("question",{title:i.title||notebookText("thisContent")}));if(message===null)return;if(message.trim().length<5){alert(notebookText("tooShort"));return}try{const token=await Auth.accessToken(),r=await fetch("/.netlify/functions/content-report",{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({message,item:{type:i.type,id:i.id,parentId:i.parentId,nivel:i.nivel,title:i.title,subtitle:i.sub,refUrl:i.link||i.refUrl}})}),d=await r.json();if(!r.ok)throw new Error(d.error||"erro");alert(notebookText("sent",{id:d.id}))}catch(e){alert(notebookText("failed"))}}
async function del(t,id){if(confirm(notebookText("remove"))){await SavedItems.remove(t,id);load()}}
document.getElementById("filters").addEventListener("click",e=>{if(e.target.classList.contains("filter-chip")){document.querySelectorAll("#filters .filter-chip").forEach(b=>b.classList.remove("active"));e.target.classList.add("active");filter=e.target.dataset.f;render()}});
document.getElementById("time-filters").addEventListener("change",e=>{
  const v=e.target.value;
  const datePick=document.getElementById("date-pick");
  if(v==="pick"){datePick.style.display="";datePick.focus();timeFilter="all";}
  else{datePick.style.display="none";datePick.value="";timeFilter=v;}
  render();
});
document.getElementById("date-pick").addEventListener("change",()=>{timeFilter="all";render()});
document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render()});
load();
</script>
