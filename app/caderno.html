<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno — DeutschBloom</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
.caderno-wrap{max-width:800px;margin:0 auto}
.search-bar{width:100%;padding:14px 18px;border-radius:14px;border:1px solid var(--border-light);background:var(--bg-secondary);color:var(--text-primary);font-size:.95rem;font-family:inherit;margin-bottom:16px}
.search-bar:focus{outline:none;border-color:var(--color-primary)}
.filter-bar{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;scrollbar-width:thin}
.filter-chip{padding:6px 11px;border-radius:18px;border:1px solid var(--border-light);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:.76rem;font-weight:600;font-family:inherit;transition:.2s;white-space:nowrap;flex:0 0 auto}
.filter-chip:hover,.filter-chip.active{background:var(--color-primary);color:#222;border-color:var(--color-primary)}
.day-group{margin-bottom:14px}
.day-header{color:var(--text-secondary);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.time-select{padding:6px 10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-secondary);color:var(--text-primary);font-size:.8rem;font-family:inherit}
.saved-card{background:var(--bg-secondary);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border-light);transition:.2s}
.saved-card:hover{border-color:var(--color-primary)}
.saved-card .top{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.saved-card .icon{font-size:1.3rem;flex-shrink:0}
.saved-card .body{flex:1;min-width:0}
.saved-card .body .title{font-weight:700;color:var(--text-primary);font-size:.9rem}
.saved-card .body .sub{color:var(--text-secondary);font-size:.78rem;margin-top:2px}
.saved-card .notes{background:rgba(255,215,0,.08);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:.8rem;color:#b8a99a;font-style:italic}
.saved-card .actions{display:flex;gap:6px;margin-top:8px}
.btn-sm{padding:5px 12px;border-radius:8px;border:1px solid var(--border-light);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:.75rem;font-family:inherit;transition:.2s}
.btn-sm:hover{border-color:var(--color-primary);color:var(--text-primary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state .big{font-size:3rem;margin-bottom:12px}
.review-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;background:rgba(126,207,126,.15);color:#7ecf7e;margin-left:6px}
.report-btn{margin-left:auto;color:#e8a84c!important}.report-btn:hover{border-color:#e8a84c!important}
@media(max-width:600px){#time-filters{display:grid!important;grid-template-columns:repeat(3,auto);overflow:visible}#date-pick{grid-column:1/-1;margin-left:0!important;width:100%}}
</style>
</head>
<body>
<div id="app-nav"></div>
<div class="container caderno-wrap" style="padding-top:28px">
<h2>📝 Caderno de Estudos</h2>
<p class="muted">Seus atalhos, anotações e revisões.</p>
<input type="text" class="search-bar" id="search" placeholder="🔍 Buscar...">
<div class="filter-bar" id="filters">
<button class="filter-chip active" data-f="all">📚 Todos</button>
<button class="filter-chip" data-f="verb">🔤 Verbos</button>
<button class="filter-chip" data-f="phrase">💬 Frases</button>
<button class="filter-chip" data-f="word">🔤 Palavras</button>
<button class="filter-chip" data-f="grammar">📖 Gramática</button>
<button class="filter-chip" data-f="dialog">💬 Diálogos</button>
<button class="filter-chip" data-f="music">🎵 Músicas</button>
<button class="filter-chip" data-f="expression">🗣️ Gírias</button>
<button class="filter-chip" data-f="profession">💼 Profissões</button>
<button class="filter-chip" data-f="lyric">🎤 Letras</button>
</div>
<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
<select class="time-select" id="time-filters">
<option value="all">📅 Qualquer data</option>
<option value="today">☀️ Hoje</option>
<option value="week">📆 Últimos 7 dias</option>
<option value="month">🗓️ Últimos 30 dias</option>
<option value="year">📅 Último ano</option>
<option value="pick">🔎 Escolher uma data...</option>
</select>
<input type="date" id="date-pick" class="time-select" style="display:none;" title="Filtrar por data específica">
</div>
<div id="content"><p class="empty-state"><span class="big">📝</span><br>Carregando...</p></div>
</div>
<script src="../assets/js/theme.js"></script>
  <script src="../assets/js/sfx.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/xp.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/i18n.js?v=20260714-ui8"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/saved_r2.js"></script>
<script>
renderNav("caderno");
const R2="https://pub-d856fe7eb96043c3a93a4d72cd8317cc.r2.dev/";
const ICONS={dialog:"💬",phrase:"💬",word:"🔤",grammar:"📖",music:"🎵",giria:"🗣️",verbo:"🔤"};
let all=[],filter="all",timeFilter="all",query="",cache={},viewItems=[];
const NOTEBOOK_COPY={
  pt:{report:"Relatar",reportTitle:"Relatar um erro neste conteúdo",question:"O que está errado em “{title}”?\nExplique como deveria ficar:",thisContent:"este conteúdo",tooShort:"Escreva um pouco mais para conseguirmos entender o erro.",sent:"Relato enviado! Ticket {id}. Obrigado por ajudar a corrigir o conteúdo.",failed:"Não foi possível enviar o relato agora. Tente novamente em instantes.",notes:"Anotações:",remove:"Remover?"},
  en:{report:"Report",reportTitle:"Report an error in this content",question:"What is wrong with “{title}”?\nExplain how it should be corrected:",thisContent:"this content",tooShort:"Please write a little more so we can understand the error.",sent:"Report sent! Ticket {id}. Thank you for helping us correct the content.",failed:"The report could not be sent right now. Please try again shortly.",notes:"Notes:",remove:"Remove?"},
  es:{report:"Informar",reportTitle:"Informar de un error en este contenido",question:"¿Qué está mal en «{title}»?\nExplica cómo debería corregirse:",thisContent:"este contenido",tooShort:"Escribe un poco más para que podamos entender el error.",sent:"¡Informe enviado! Ticket {id}. Gracias por ayudarnos a corregir el contenido.",failed:"No se pudo enviar el informe ahora. Inténtalo de nuevo en unos instantes.",notes:"Notas:",remove:"¿Eliminar?"},
  fr:{report:"Signaler",reportTitle:"Signaler une erreur dans ce contenu",question:"Qu’est-ce qui ne va pas dans « {title} » ?\nExpliquez comment cela devrait être corrigé :",thisContent:"ce contenu",tooShort:"Écrivez un peu plus afin que nous puissions comprendre l’erreur.",sent:"Signalement envoyé ! Ticket {id}. Merci de nous aider à corriger le contenu.",failed:"Impossible d’envoyer le signalement pour le moment. Réessayez dans quelques instants.",notes:"Notes :",remove:"Supprimer ?"},
  it:{report:"Segnala",reportTitle:"Segnala un errore in questo contenuto",question:"Cosa c’è di sbagliato in «{title}»?\nSpiega come dovrebbe essere corretto:",thisContent:"questo contenuto",tooShort:"Scrivi qualche dettaglio in più per aiutarci a capire l’errore.",sent:"Segnalazione inviata! Ticket {id}. Grazie per averci aiutato a correggere il contenuto.",failed:"Impossibile inviare la segnalazione ora. Riprova tra qualche istante.",notes:"Note:",remove:"Rimuovere?"},
  tr:{report:"Bildir",reportTitle:"Bu içerikteki bir hatayı bildir",question:"“{title}” içeriğinde yanlış olan nedir?\nNasıl düzeltilmesi gerektiğini açıklayın:",thisContent:"bu içerik",tooShort:"Hatayı anlayabilmemiz için lütfen biraz daha ayrıntı yazın.",sent:"Bildirim gönderildi! Talep {id}. İçeriği düzeltmemize yardımcı olduğunuz için teşekkürler.",failed:"Bildirim şu anda gönderilemedi. Lütfen kısa bir süre sonra tekrar deneyin.",notes:"Notlar:",remove:"Kaldırılsın mı?"},
  ar:{report:"إبلاغ",reportTitle:"الإبلاغ عن خطأ في هذا المحتوى",question:"ما الخطأ في «{title}»؟\nاشرح كيف ينبغي تصحيحه:",thisContent:"هذا المحتوى",tooShort:"يرجى كتابة تفاصيل أكثر حتى نتمكن من فهم الخطأ.",sent:"تم إرسال البلاغ! التذكرة {id}. شكرًا لمساعدتنا في تصحيح المحتوى.",failed:"تعذر إرسال البلاغ الآن. يرجى المحاولة مرة أخرى بعد قليل.",notes:"ملاحظات:",remove:"إزالة؟"},
  he:{report:"דיווח",reportTitle:"דיווח על שגיאה בתוכן הזה",question:"מה שגוי ב־„{title}”?\nהסבירו כיצד צריך לתקן זאת:",thisContent:"התוכן הזה",tooShort:"כתבו מעט יותר כדי שנוכל להבין את השגיאה.",sent:"הדיווח נשלח! פנייה {id}. תודה שעזרתם לנו לתקן את התוכן.",failed:"לא ניתן לשלוח את הדיווח כרגע. נסו שוב בעוד כמה רגעים.",notes:"הערות:",remove:"להסיר?"},
  hi:{report:"रिपोर्ट करें",reportTitle:"इस सामग्री में त्रुटि की रिपोर्ट करें",question:"“{title}” में क्या गलत है?\nबताएँ कि इसे कैसे सुधारा जाना चाहिए:",thisContent:"यह सामग्री",tooShort:"त्रुटि समझने में हमारी मदद के लिए कृपया थोड़ा और लिखें।",sent:"रिपोर्ट भेज दी गई! टिकट {id}। सामग्री सुधारने में मदद के लिए धन्यवाद।",failed:"अभी रिपोर्ट नहीं भेजी जा सकी। कृपया कुछ देर बाद फिर कोशिश करें।",notes:"नोट्स:",remove:"हटाएँ?"},
  pl:{report:"Zgłoś",reportTitle:"Zgłoś błąd w tej treści",question:"Co jest nie tak w „{title}”?\nWyjaśnij, jak należy to poprawić:",thisContent:"ta treść",tooShort:"Napisz trochę więcej, abyśmy mogli zrozumieć błąd.",sent:"Zgłoszenie wysłane! Numer {id}. Dziękujemy za pomoc w poprawianiu treści.",failed:"Nie udało się teraz wysłać zgłoszenia. Spróbuj ponownie za chwilę.",notes:"Notatki:",remove:"Usunąć?"}
};
function notebookText(key,vars={}){const lang=typeof I18n!=="undefined"?I18n.getCurrent():"pt";let text=(NOTEBOOK_COPY[lang]||NOTEBOOK_COPY.pt)[key]||NOTEBOOK_COPY.pt[key]||key;Object.entries(vars).forEach(([name,value])=>text=text.replace(`{${name}}`,value));return text}
const ad=new Audio();
function playAudio(audioPath, btn){
  if(!audioPath)return;
  if(ad.src&&ad.src.includes(audioPath)&&!ad.paused){ad.pause();btn.textContent="▶";return}
  btn.textContent="⏳";
  // Tenta Supabase + R2 em paralelo (quem cair primeiro toca)
  const r2url=audioPath.startsWith("http")?audioPath:(R2+audioPath);
  AFBData.signedAudioUrl(audioPath).then(url=>{
    if(url&&(!ad.src||ad.paused)){ad.src=url;ad.play().catch(()=>{});btn.textContent="⏸"}
  }).catch(()=>{});
  // Fallback R2
  setTimeout(()=>{
    if(!ad.src||ad.paused){ad.src=r2url;ad.play().catch(()=>{})}
  },800);
  ad.oncanplay=()=>btn.textContent="⏸";
  ad.onended=()=>btn.textContent="▶";
  ad.onpause=()=>btn.textContent="▶";
}
async function resolve(item){
  const ck=item.type+"_"+item.id;
  if(cache[ck])return cache[ck];
  if(["phrase","word","grammar","dialog"].includes(item.type)&&item.nivel){
    try{
      const data=await AFBData.nivel(item.nivel);
      for(const th of data.dialog_themes){for(const d of th.dialogs){
        if(item.type==="dialog"&&d.id===item.parentId){cache[ck]={title:d.title,sub:d.german_title,audio:d.main_audio_url,link:`dialogo.html?id=${d.id}&nivel=${item.nivel}`};return cache[ck]}
        if(item.type==="phrase"){const s=d.sentences?.find(x=>x.id===item.id);if(s){cache[ck]={title:s.german_text,sub:s.portuguese_translation,audio:s.audio_url,link:`dialogo.html?id=${d.id}&nivel=${item.nivel}`};return cache[ck]}}
        if(item.type==="word"){const v=d.vocabulary?.find(x=>x.id===item.id);if(v){cache[ck]={title:v.german_word,sub:v.portuguese_translation,audio:v.audio_url,link:`dialogo.html?id=${d.id}&nivel=${item.nivel}`};return cache[ck]}}
        if(item.type==="grammar"){const g=d.grammar_tips?.find(x=>x.id===item.id);if(g){cache[ck]={title:g.title,sub:g.german_example,audio:"",link:`dialogo.html?id=${d.id}&nivel=${item.nivel}`};return cache[ck]}}
      }}
    }catch(e){}
  }
  cache[ck]={title:"Item #"+item.id,sub:"",audio:"",link:item.refUrl||"#"};return cache[ck];
}
function group(items){
  const g={},now=new Date(),t=new Date(now.getFullYear(),now.getMonth(),now.getDate()),y=new Date(t.getTime()-86400000);
  for(const i of items){const d=new Date(i.created_at),dk=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();let l;if(dk===t.getTime())l="Hoje";else if(dk===y.getTime())l="Ontem";else l=d.toLocaleDateString("pt-BR");if(!g[l])g[l]=[];g[l].push(i)}return g;
}
async function render(){
  const el=document.getElementById("content");
  let items=all;
  if(filter!=="all")items=items.filter(i=>i.type===filter);
  // Time filter
  if(timeFilter!=="all"){
    const now=new Date();
    const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    items=items.filter(i=>{
      const d=new Date(i.created_at);
      if(timeFilter==="today") return d>=today;
      if(timeFilter==="week") return d>=new Date(today.getTime()-7*86400000);
      if(timeFilter==="month") return d>=new Date(today.getTime()-30*86400000);
      if(timeFilter==="year") return d>=new Date(today.getFullYear()-1,today.getMonth(),today.getDate());
      return true;
    });
  }
  // Date picker filter
  const dp=document.getElementById("date-pick");
  if(dp&&dp.value){
    const pickDate=new Date(dp.value+"T00:00:00");
    items=items.filter(i=>{
      const d=new Date(i.created_at);
      return d.getFullYear()===pickDate.getFullYear()&&d.getMonth()===pickDate.getMonth()&&d.getDate()===pickDate.getDate();
    });
  }
  if(query){const q=query.toLowerCase();items=items.filter(i=>(i.notes||"").toLowerCase().includes(q)||(i.title||"").toLowerCase().includes(q))}
  if(!items.length){el.innerHTML='<div class="empty-state"><div class="big">📝</div><p>Nenhum item.</p><p class="muted">Salve frases clicando 💛!</p></div>';return}
  const resolved=await Promise.all(items.map(async i=>{const r=await resolve(i);return{...i,...r}}));viewItems=resolved;resolved.forEach((i,n)=>i._viewIndex=n);
  const groups=group(resolved);let h="";
  for(const[lbl,gi]of Object.entries(groups)){h+=`<div class="day-group"><div class="day-header">${lbl}</div>`;
    for(const i of gi){h+=`<div class="saved-card"><div class="top" onclick="window.location='${i.link||"#"}'"><span class="icon">${ICONS[i.type]||"📌"}</span><div class="body"><div class="title">${i.title||"Sem título"}${i.reviewed_at?'<span class="review-tag">✅</span>':''}</div>${i.sub?`<div class="sub">${i.sub}</div>`:""}</div>${i.audio?`<button class="btn-sm" style="flex-shrink:0" onclick="event.stopPropagation();playAudio('${i.audio}',this)">▶</button>`:""}</div>${i.notes?`<div class="notes">📝 ${i.notes}</div>`:""}<div class="actions"><button class="btn-sm" onclick="editNotes('${i.type}',${i.id},'${(i.notes||"").replace(/'/g,"\\'")}')">✏️ ${i.notes?'Editar':'Anotar'}</button><button class="btn-sm" onclick="review('${i.type}',${i.id})">✅</button><button class="btn-sm report-btn" title="${notebookText('reportTitle')}" onclick="reportItem(${i._viewIndex})">❗ ${notebookText('report')}</button><button class="btn-sm" style="color:#f44;border-color:transparent" onclick="del('${i.type}',${i.id})">🗑️</button></div></div>`}h+="</div>"}
  el.innerHTML=h;
}
async function load(){all=await SavedItems.getAll();render()}
async function editNotes(t,id,cur){const n=prompt(notebookText("notes"),cur==="undefined"?"":cur);if(n!==null){await SavedItems.updateNotes(t,id,n);load()}}
async function review(t,id){await SavedItems.markReviewed(t,id);try{Progress.complete(`saved-${t}-${id}`,0)}catch(e){}load()}
async function reportItem(index){const i=viewItems[index];if(!i)return;const message=prompt(notebookText("question",{title:i.title||notebookText("thisContent")}));if(message===null)return;if(message.trim().length<5){alert(notebookText("tooShort"));return}try{const token=await Auth.accessToken(),r=await fetch("/.netlify/functions/content-report",{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({message,item:{type:i.type,id:i.id,parentId:i.parentId,nivel:i.nivel,title:i.title,subtitle:i.sub,refUrl:i.link||i.refUrl}})}),d=await r.json();if(!r.ok)throw new Error(d.error||"erro");alert(notebookText("sent",{id:d.id}))}catch(e){alert(notebookText("failed"))}}
async function del(t,id){if(confirm(notebookText("remove"))){await SavedItems.remove(t,id);load()}}
document.getElementById("filters").addEventListener("click",e=>{if(e.target.classList.contains("filter-chip")){document.querySelectorAll("#filters .filter-chip").forEach(b=>b.classList.remove("active"));e.target.classList.add("active");filter=e.target.dataset.f;render()}});
document.getElementById("time-filters").addEventListener("change",e=>{
  const v=e.target.value;
  const datePick=document.getElementById("date-pick");
  if(v==="pick"){datePick.style.display="";datePick.focus();timeFilter="all";}
  else{datePick.style.display="none";datePick.value="";timeFilter=v;}
  render();
});
document.getElementById("date-pick").addEventListener("change",()=>{timeFilter="all";render()});
document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render()});
load();
</script>
</body>
