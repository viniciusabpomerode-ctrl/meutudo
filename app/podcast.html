<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podcast — DeutschBloom</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .pcast-player {
      background: var(--bg-secondary); border-radius: 16px; padding: 20px;
      margin-bottom: 20px; border: 1px solid var(--border-light);
      position: sticky; top: 10px; z-index: 5;
    }
    .pcast-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .pcast-top .info { flex: 1; min-width: 120px; }
    .pcast-top .info h3 { margin: 0; font-size: 1rem; }
    .pcast-top .info small { color: var(--text-secondary); }
    .pcast-progress { margin-top: 12px; }
    .pcast-progress input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: var(--border-light); border-radius: 2px; outline: none;
    }
    .pcast-progress input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--color-primary); cursor: pointer;
    }
    .pcast-time { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text-secondary); margin-top: 4px; }
    .pcast-controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .pcast-controls .btn-icon {
      border: none; background: var(--card-hover); color: var(--text-primary); border-radius: 50%;
      width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; transition: .2s;
    }
    .pcast-controls .btn-icon:hover { background: var(--border-light); }
    .pcast-controls .btn-play { width: 56px; height: 56px; background: var(--color-primary); color: #fff; font-size: 1.4rem; }
    .pcast-controls .btn-play.playing { background: var(--color-warm); }
    .pcast-row2 { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .pcast-speed-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .pcast-volume { display: flex; align-items: center; gap: 6px; }
    .pcast-volume input[type="range"] { width: 80px; }
    .pcast-toggle-btn {
      border: 1px solid var(--border-light); background: var(--card-bg); color: var(--text-primary);
      border-radius: 999px; padding: 6px 14px; font-size: .78rem; font-weight: 600; cursor: pointer;
    }
    .pcast-toggle-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .pcast-chapters { display: flex; gap: 6px; overflow-x: auto; margin-top: 12px; padding-bottom: 4px; }
    .pcast-chapters button {
      flex-shrink: 0; border: 1px solid var(--border-light); background: var(--card-bg);
      border-radius: 999px; padding: 5px 12px; font-size: .74rem; cursor: pointer; color: var(--text-primary);
    }
    .pcast-chapters button.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .sentence-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-radius: 12px; margin-bottom: 6px; transition: .3s;
      border-left: 3px solid transparent; cursor: pointer;
    }
    .sentence-row.highlight { background: var(--color-primary-light, rgba(255,215,0,.15)); border-left-color: var(--color-primary, #FFD700); transform: translateX(4px); }
    .sentence-row .sentence-de { font-weight: 600; font-size: .95rem; }
    .sentence-row .sentence-tr { color: var(--text-secondary); font-size: .85rem; margin-top: 2px; }
    body.pcast-hide-translation .sentence-tr { display: none; }
    body.pcast-focus-mode .container > *:not(#focus-wrap) { display: none !important; }
    body.pcast-focus-mode #app-nav { display: none !important; }
    #focus-wrap { display: none; }
    body.pcast-focus-mode #focus-wrap { display: block; }
    .pcast-focus-sentence { text-align: center; padding: 40px 16px; }
    .pcast-focus-sentence .fde { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    .pcast-focus-sentence .ftr { font-size: 1.1rem; color: var(--text-secondary); }
    @media (max-width: 640px) {
      .pcast-player { position: static; }
      .pcast-controls .btn-icon { width: 48px; height: 48px; }
      .pcast-controls .btn-play { width: 64px; height: 64px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div id="app-nav"></div>
  <div class="container" style="padding-top:28px; max-width:760px;">
    <a href="podcasts.html" class="muted" id="pcast-back-link">← Voltar para Podcasts</a>
    <div class="card" id="content" style="margin-top:14px;">Carregando...</div>
    <div id="focus-wrap"></div>
  </div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/sfx.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/xp.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script>
    renderNav("podcasts");

    const params = new URLSearchParams(location.search);
    const slug = params.get("slug");
    const langParam = params.get("lang") || (typeof I18n !== "undefined" ? I18n.getCurrent() : "pt");
    const COMPLETE_THRESHOLD = 0.90;
    const PODCAST_XP = (typeof ACTIVITY_REWARDS !== "undefined" && ACTIVITY_REWARDS.podcast_completed) || 25;
    const PLAYER_UI = {
      pt:{back:"← Voltar para Podcasts",done:"✅ Concluído",xp:"XP ao concluir",show:"Mostrar tradução",hide:"Ocultar tradução",focus:"🎧 Modo foco",prevChapter:"Capítulo anterior",nextChapter:"Próximo capítulo",chapter:"cap.",phrases:"Frases",missing:"Podcast não encontrado.",error:"Não deu pra carregar este podcast agora. Tenta de novo em instantes.",levelUp:"Parabéns! Você subiu para o nível"},
      en:{back:"← Back to Podcasts",done:"✅ Completed",xp:"XP on completion",show:"Show translation",hide:"Hide translation",focus:"🎧 Focus mode",prevChapter:"Previous chapter",nextChapter:"Next chapter",chapter:"ch.",phrases:"Sentences",missing:"Podcast not found.",error:"The podcast could not be loaded. Please try again shortly.",levelUp:"Congratulations! You reached level"},
      es:{back:"← Volver a Podcasts",done:"✅ Completado",xp:"XP al completar",show:"Mostrar traducción",hide:"Ocultar traducción",focus:"🎧 Modo enfoque",prevChapter:"Capítulo anterior",nextChapter:"Capítulo siguiente",chapter:"cap.",phrases:"Frases",missing:"Podcast no encontrado.",error:"No se pudo cargar este podcast. Inténtalo de nuevo en unos instantes.",levelUp:"¡Felicidades! Has subido al nivel"},
      fr:{back:"← Retour aux Podcasts",done:"✅ Terminé",xp:"XP à la fin",show:"Afficher la traduction",hide:"Masquer la traduction",focus:"🎧 Mode concentration",prevChapter:"Chapitre précédent",nextChapter:"Chapitre suivant",chapter:"chap.",phrases:"Phrases",missing:"Podcast introuvable.",error:"Impossible de charger ce podcast. Réessayez dans quelques instants.",levelUp:"Félicitations ! Vous avez atteint le niveau"},
      it:{back:"← Torna ai Podcast",done:"✅ Completato",xp:"XP al completamento",show:"Mostra traduzione",hide:"Nascondi traduzione",focus:"🎧 Modalità concentrazione",prevChapter:"Capitolo precedente",nextChapter:"Capitolo successivo",chapter:"cap.",phrases:"Frasi",missing:"Podcast non trovato.",error:"Impossibile caricare questo podcast. Riprova tra poco.",levelUp:"Congratulazioni! Hai raggiunto il livello"},
      tr:{back:"← Podcast'lere dön",done:"✅ Tamamlandı",xp:"Tamamlayınca XP",show:"Çeviriyi göster",hide:"Çeviriyi gizle",focus:"🎧 Odak modu",prevChapter:"Önceki bölüm",nextChapter:"Sonraki bölüm",chapter:"böl.",phrases:"Cümleler",missing:"Podcast bulunamadı.",error:"Bu podcast yüklenemedi. Lütfen kısa süre sonra tekrar deneyin.",levelUp:"Tebrikler! Şu seviyeye ulaştınız:"},
      ar:{back:"← العودة إلى البودكاست",done:"✅ مكتمل",xp:"نقطة عند الإكمال",show:"إظهار الترجمة",hide:"إخفاء الترجمة",focus:"🎧 وضع التركيز",prevChapter:"الفصل السابق",nextChapter:"الفصل التالي",chapter:"فصل",phrases:"الجمل",missing:"البودكاست غير موجود.",error:"تعذر تحميل هذا البودكاست. حاول مرة أخرى بعد قليل.",levelUp:"تهانينا! وصلت إلى المستوى"},
      he:{back:"← חזרה לפודקאסטים",done:"✅ הושלם",xp:"XP בהשלמה",show:"הצגת תרגום",hide:"הסתרת תרגום",focus:"🎧 מצב מיקוד",prevChapter:"הפרק הקודם",nextChapter:"הפרק הבא",chapter:"פרק",phrases:"משפטים",missing:"הפודקאסט לא נמצא.",error:"לא ניתן לטעון את הפודקאסט. נסו שוב בעוד רגע.",levelUp:"כל הכבוד! הגעתם לרמה"},
      hi:{back:"← पॉडकास्ट पर वापस जाएँ",done:"✅ पूर्ण",xp:"पूरा करने पर XP",show:"अनुवाद दिखाएँ",hide:"अनुवाद छिपाएँ",focus:"🎧 फ़ोकस मोड",prevChapter:"पिछला अध्याय",nextChapter:"अगला अध्याय",chapter:"अध्याय",phrases:"वाक्य",missing:"पॉडकास्ट नहीं मिला।",error:"यह पॉडकास्ट लोड नहीं हो सका। थोड़ी देर बाद फिर प्रयास करें।",levelUp:"बधाई! आप इस स्तर पर पहुँच गए:"},
      pl:{back:"← Wróć do Podcastów",done:"✅ Ukończono",xp:"XP za ukończenie",show:"Pokaż tłumaczenie",hide:"Ukryj tłumaczenie",focus:"🎧 Tryb skupienia",prevChapter:"Poprzedni rozdział",nextChapter:"Następny rozdział",chapter:"rozdz.",phrases:"Zdania",missing:"Nie znaleziono podcastu.",error:"Nie udało się załadować podcastu. Spróbuj ponownie za chwilę.",levelUp:"Gratulacje! Osiągasz poziom"}
    };
    const pui = () => PLAYER_UI[PC.language] || PLAYER_UI.pt;

    const PC = {
      audio: new Audio(),
      episode: null,
      catalogEntry: null,
      language: langParam,
      speed: 1.0,
      sentences: [],   // flattened, com referência ao capítulo
      currentSentenceIdx: -1,
      currentChapterIdx: -1,
      segmentEnd: null,     // quando tocando só uma frase, hora de pausar
      completedFlag: false,
      lastLocalSave: 0,
      lastRemoteSync: 0,
      volume: 1.0,
    };

    function fmtTime(sec) {
      if (!sec || sec < 0) return "0:00";
      const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    function flattenSentences(episode) {
      const out = [];
      (episode.chapters || []).forEach((ch, chIdx) => {
        (ch.sentences || []).forEach(s => out.push({ ...s, chapterIdx: chIdx, chapterLabel: ch.label }));
      });
      return out;
    }

    // ---------------- Carregamento do episódio ----------------
    async function loadEpisode(lang) {
      const episode = await AFBData.podcast(slug, lang);
      PC.episode = episode;
      PC.language = lang;
      PC.sentences = flattenSentences(episode);
      return episode;
    }

    function findSentenceIndexNear(oldIdx) {
      // Ao trocar de idioma, o número de frases é igual -- preserva a
      // posição pelo índice da frase, não pelo tempo em segundos (que
      // muda de idioma pra idioma).
      if (oldIdx == null || oldIdx < 0) return 0;
      return Math.min(oldIdx, PC.sentences.length - 1);
    }

    // ---------------- Progresso / posição salva ----------------
    function loadSavedPosition() {
      return Progress.getPodcastPosition(slug, PC.language);
    }

    function saveLocalPosition() {
      const a = PC.audio;
      if (!a.duration) return;
      Progress.savePodcastPosition(slug, PC.language, {
        position: a.currentTime,
        duration: a.duration,
        chapterId: PC.episode?.chapters?.[PC.currentChapterIdx]?.id || null,
        sentenceId: PC.sentences[PC.currentSentenceIdx]?.id || null,
        completed: PC.completedFlag,
      });
    }

    function maybeCompleteEpisode() {
      const a = PC.audio;
      if (!a.duration || PC.completedFlag) return;
      if (a.currentTime / a.duration >= COMPLETE_THRESHOLD) {
        PC.completedFlag = true;
        const result = Progress.completePodcast(slug, PODCAST_XP);
        if (result.leveledUp) {
          setTimeout(() => alert(`🎉 ${pui().levelUp} ${result.newLevel}!`), 200);
        }
        saveLocalPosition();
        Progress.syncPodcastNow();
        updateCompletionBadge();
      }
    }

    function updateCompletionBadge() {
      const el = document.getElementById("pcast-status-badge");
      if (el) el.outerHTML = PC.completedFlag
        ? `<span class="badge" id="pcast-status-badge">${pui().done}</span>`
        : `<span class="xp-pill" id="pcast-status-badge">+${PODCAST_XP} ${pui().xp}</span>`;
    }

    // ---------------- Highlight de capítulo/frase ----------------
    function updateHighlight(time) {
      const sentences = PC.sentences;
      if (!sentences.length) return;
      let idx = -1;
      for (let i = 0; i < sentences.length; i++) {
        const s = sentences[i];
        const start = s.start_time_seconds || 0;
        const end = s.end_time_seconds || start + 3;
        if (time >= start && time < end) { idx = i; break; }
      }
      if (idx === -1 && time > 0) {
        const last = sentences[sentences.length - 1];
        if (last && last.end_time_seconds && time >= last.end_time_seconds) idx = sentences.length - 1;
      }
      if (idx !== PC.currentSentenceIdx) {
        document.querySelectorAll(".sentence-row").forEach(r => r.classList.remove("highlight"));
        PC.currentSentenceIdx = idx;
        if (idx >= 0) {
          const rows = document.querySelectorAll(".sentence-row");
          if (rows[idx]) { rows[idx].classList.add("highlight"); rows[idx].scrollIntoView({ behavior: "smooth", block: "center" }); }
          PC.currentChapterIdx = sentences[idx].chapterIdx;
          updateChapterHighlight();
          updateFocusView(sentences[idx]);
          updateMediaSessionPosition();
        }
      }
      // Segmento individual ("tocar só esta frase"): pausa ao chegar no fim
      if (PC.segmentEnd != null && time >= PC.segmentEnd) {
        PC.audio.pause();
        PC.segmentEnd = null;
        renderSegmentButtons();
      }
    }

    function updateChapterHighlight() {
      document.querySelectorAll(".pcast-chapters button").forEach((b, i) => {
        b.classList.toggle("active", i === PC.currentChapterIdx);
      });
    }

    function updateFocusView(sentence) {
      const wrap = document.getElementById("focus-wrap");
      if (!wrap || !document.body.classList.contains("pcast-focus-mode")) return;
      wrap.querySelector(".pcast-focus-sentence .fde").textContent = sentence.german_text;
      wrap.querySelector(".pcast-focus-sentence .ftr").textContent = sentence.translation;
    }

    function renderSegmentButtons() {
      document.querySelectorAll(".sentence-play-btn").forEach(b => { b.textContent = "▶"; });
    }

    // ---------------- Player principal ----------------
    function resolveAudioUrl() {
      return AFBData.podcastAudioUrl(PC.episode.audio_file);
    }

    function playFull() {
      const a = PC.audio;
      if (!a.src) { a.src = resolveAudioUrl(); a.playbackRate = PC.speed; a.volume = PC.volume; }
      PC.segmentEnd = null;
      a.play().catch(() => {});
    }

    function seekTo(seconds) {
      const a = PC.audio;
      if (!a.src) { a.src = resolveAudioUrl(); a.playbackRate = PC.speed; a.volume = PC.volume; }
      a.currentTime = Math.max(0, seconds);
    }

    function seekBy(delta) {
      const a = PC.audio;
      if (!a.duration) return;
      a.currentTime = Math.max(0, Math.min(a.duration, a.currentTime + delta));
    }

    function playSegment(idx) {
      const s = PC.sentences[idx];
      if (!s) return;
      const a = PC.audio;
      const alreadyThisSegment = PC.segmentEnd != null && Math.abs(a.currentTime - s.start_time_seconds) < 1.5;
      if (alreadyThisSegment && !a.paused) { a.pause(); PC.segmentEnd = null; renderSegmentButtons(); return; }
      seekTo(s.start_time_seconds);
      PC.segmentEnd = s.end_time_seconds;
      a.play().catch(() => {});
      renderSegmentButtons();
      const btn = document.querySelector(`.sentence-play-btn[data-idx="${idx}"]`);
      if (btn) btn.textContent = "⏸";
    }

    function setSpeed(speed) {
      PC.speed = speed;
      PC.audio.playbackRate = speed;
      document.querySelectorAll(".pcast-speed-row button").forEach(b => b.classList.toggle("active", parseFloat(b.dataset.speed) === speed));
    }

    function setVolume(v) {
      PC.volume = v;
      PC.audio.volume = v;
    }

    function toggleTranslation() {
      document.body.classList.toggle("pcast-hide-translation");
      document.querySelectorAll("#toggle-translation-btn").forEach(btn => {
        btn.classList.toggle("active", document.body.classList.contains("pcast-hide-translation"));
        btn.textContent = document.body.classList.contains("pcast-hide-translation") ? pui().show : pui().hide;
      });
    }

    function toggleFocusMode() {
      document.body.classList.toggle("pcast-focus-mode");
      const on = document.body.classList.contains("pcast-focus-mode");
      document.querySelectorAll("#focus-mode-btn").forEach(btn => btn.classList.toggle("active", on));
      if (on && PC.currentSentenceIdx >= 0) updateFocusView(PC.sentences[PC.currentSentenceIdx]);
    }

    // ---------------- Media Session (tela bloqueada) ----------------
    function setupMediaSession() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: PC.episode.german_title,
        artist: "DeutschBloom",
        album: `${PC.catalogEntry?.genre || ""} · ${PC.episode.level || ""}`,
      });
      navigator.mediaSession.setActionHandler("play", () => playFull());
      navigator.mediaSession.setActionHandler("pause", () => PC.audio.pause());
      navigator.mediaSession.setActionHandler("seekbackward", () => seekBy(-15));
      navigator.mediaSession.setActionHandler("seekforward", () => seekBy(15));
      navigator.mediaSession.setActionHandler("previoustrack", () => stepSentence(-1));
      navigator.mediaSession.setActionHandler("nexttrack", () => stepSentence(1));
    }
    function updateMediaSessionPosition() {
      if (!("mediaSession" in navigator) || !PC.audio.duration) return;
      try {
        navigator.mediaSession.setPositionState({
          duration: PC.audio.duration, playbackRate: PC.audio.playbackRate, position: PC.audio.currentTime,
        });
      } catch (e) {}
    }

    function stepSentence(dir) {
      const idx = Math.max(0, Math.min(PC.sentences.length - 1, PC.currentSentenceIdx + dir));
      seekTo(PC.sentences[idx].start_time_seconds);
      PC.segmentEnd = null;
      if (PC.audio.paused) PC.audio.play().catch(() => {});
    }
    function stepChapter(dir) {
      const idx = Math.max(0, Math.min(PC.episode.chapters.length - 1, PC.currentChapterIdx + dir));
      seekTo(PC.episode.chapters[idx].start_time_seconds);
      PC.segmentEnd = null;
      if (PC.audio.paused) PC.audio.play().catch(() => {});
    }

    // ---------------- Troca de idioma ----------------
    async function switchLanguage(newLang) {
      const oldIdx = PC.currentSentenceIdx;
      PC.audio.pause();
      try { localStorage.setItem("afb_language", newLang); } catch {}
      await loadEpisode(newLang);
      document.getElementById("pcast-back-link").textContent = pui().back;
      render();
      const targetIdx = findSentenceIndexNear(oldIdx);
      if (targetIdx > 0) {
        PC.audio.src = resolveAudioUrl();
        PC.audio.playbackRate = PC.speed;
        PC.audio.volume = PC.volume;
        PC.audio.currentTime = PC.sentences[targetIdx].start_time_seconds;
      }
      const url = new URL(location.href);
      url.searchParams.set("lang", newLang);
      history.replaceState(null, "", url);
    }

    // ---------------- Render ----------------
    function buildPlayerHtml() {
      const dur = PC.episode.duration_seconds;
      return `
        <div class="pcast-player">
          <div class="pcast-top">
            <button class="btn-icon btn-play" id="pcast-play-btn">▶</button>
            <div class="info">
              <h3>${PC.episode.german_title}</h3>
              <small>${PC.episode.theme ? PC.episode.theme + " · " : ""}${PC.episode.level || ""}</small>
            </div>
            <select id="pcast-lang-select" class="pod-lang-select" style="padding:6px 10px;border-radius:999px;border:2px solid var(--border-light);background:var(--card-bg);"></select>
          </div>
          <div class="pcast-progress">
            <input type="range" id="pcast-slider" value="0" max="100" step="0.05">
            <div class="pcast-time"><span id="pcast-time-cur">0:00</span><span id="pcast-time-total">${fmtTime(dur)}</span></div>
          </div>
          <div class="pcast-controls">
            <button class="btn-icon" id="pcast-back15" title="Voltar 15s">⏪15</button>
            <button class="btn-icon" id="pcast-prev-sentence" title="Frase anterior">⏮</button>
            <button class="btn-icon btn-play" id="pcast-play-btn2">▶</button>
            <button class="btn-icon" id="pcast-next-sentence" title="Próxima frase">⏭</button>
            <button class="btn-icon" id="pcast-fwd15" title="Avançar 15s">15⏩</button>
          </div>
          <div class="pcast-row2">
            <div class="pcast-speed-row">
              ${[0.5, 0.75, 1.0, 1.25, 1.5].map(sp => `<button data-speed="${sp}" class="pod-chip ${sp === 1 ? 'active' : ''}" style="padding:4px 10px;font-size:.72rem;">${sp}x</button>`).join("")}
            </div>
            <div class="pcast-volume">
              🔊 <input type="range" id="pcast-volume" min="0" max="1" step="0.05" value="1">
            </div>
          </div>
          <div class="pcast-row2">
            <button class="pcast-toggle-btn" id="toggle-translation-btn">${pui().hide}</button>
            <button class="pcast-toggle-btn" id="focus-mode-btn">${pui().focus}</button>
            <button class="btn-icon" id="pcast-prev-chapter" title="${pui().prevChapter}">⏮ ${pui().chapter}</button>
            <button class="btn-icon" id="pcast-next-chapter" title="${pui().nextChapter}">${pui().chapter} ⏭</button>
          </div>
          <div class="pcast-chapters" id="pcast-chapters">
            ${(PC.episode.chapters || []).map((c, i) => `<button data-idx="${i}">${c.label}</button>`).join("")}
          </div>
        </div>`;
    }

    function render() {
      const el = document.getElementById("content");
      const done = Progress.isCompleted("podcast-" + slug);
      PC.completedFlag = done;

      el.innerHTML = `
        <div class="flex-between" style="align-items:center;">
          <h2 style="margin:0;">${PC.episode.german_title}</h2>
          ${done ? `<span class="badge" id="pcast-status-badge">${pui().done}</span>` : `<span class="xp-pill" id="pcast-status-badge">+${PODCAST_XP} ${pui().xp}</span>`}
        </div>
        <p class="muted">${PC.catalogEntry?.premise || ""}</p>

        ${buildPlayerHtml()}

        <h4 class="section-title" style="margin-top:24px;">${pui().phrases}</h4>
        <div id="sentences-wrap">
          ${PC.sentences.map((s, idx) => `
            <div class="sentence-row" data-idx="${idx}">
              <div>
                <div class="sentence-de">${s.german_text}</div>
                <div class="sentence-tr" data-no-translate>${s.translation}</div>
              </div>
              <button class="btn btn-ghost btn-sm sentence-play-btn" data-idx="${idx}">▶</button>
            </div>`).join("")}
        </div>
      `;

      document.getElementById("focus-wrap").innerHTML = `
        <div class="pcast-focus-sentence">
          <div class="fde"></div>
          <div class="ftr"></div>
        </div>
        ${buildPlayerHtml()}
      `;

      buildLangSelectors();
      attachEvents();
    }

    function buildLangSelectors() {
      const opts = Object.values(AppLanguage)
        .filter(l => !PC.catalogEntry || PC.catalogEntry.languages_available.includes(l.code))
        .map(l => `<option value="${l.code}" ${l.code === PC.language ? "selected" : ""}>${l.flag} ${l.name}</option>`)
        .join("");
      document.querySelectorAll("#pcast-lang-select").forEach(sel => {
        sel.innerHTML = opts;
        sel.addEventListener("change", () => switchLanguage(sel.value));
      });
    }

    function attachEvents() {
      const a = PC.audio;

      document.querySelectorAll("#pcast-play-btn, #pcast-play-btn2").forEach(btn => {
        btn.addEventListener("click", () => {
          if (a.src && !a.paused) { a.pause(); return; }
          playFull();
        });
      });

      document.querySelectorAll(".sentence-row").forEach(row => {
        row.addEventListener("click", (e) => {
          if (e.target.closest(".sentence-play-btn")) return;
          const idx = parseInt(row.dataset.idx);
          seekTo(PC.sentences[idx].start_time_seconds);
          PC.segmentEnd = null;
          if (a.paused) a.play().catch(() => {});
        });
      });
      document.querySelectorAll(".sentence-play-btn").forEach(btn => {
        btn.addEventListener("click", (e) => { e.stopPropagation(); playSegment(parseInt(btn.dataset.idx)); });
      });

      document.querySelectorAll("#pcast-slider").forEach(slider => {
        slider.addEventListener("input", () => {
          if (!a.duration) return;
          const t = (parseFloat(slider.value) / 100) * a.duration;
          seekTo(t);
        });
      });

      document.querySelectorAll(".pcast-speed-row button").forEach(btn => {
        btn.addEventListener("click", () => setSpeed(parseFloat(btn.dataset.speed)));
      });
      document.querySelectorAll("#pcast-volume").forEach(v => v.addEventListener("input", () => setVolume(parseFloat(v.value))));

      document.querySelectorAll("#pcast-back15").forEach(b => b.addEventListener("click", () => seekBy(-15)));
      document.querySelectorAll("#pcast-fwd15").forEach(b => b.addEventListener("click", () => seekBy(15)));
      document.querySelectorAll("#pcast-prev-sentence").forEach(b => b.addEventListener("click", () => stepSentence(-1)));
      document.querySelectorAll("#pcast-next-sentence").forEach(b => b.addEventListener("click", () => stepSentence(1)));
      document.querySelectorAll("#pcast-prev-chapter").forEach(b => b.addEventListener("click", () => stepChapter(-1)));
      document.querySelectorAll("#pcast-next-chapter").forEach(b => b.addEventListener("click", () => stepChapter(1)));

      document.querySelectorAll("#toggle-translation-btn").forEach(btn => btn.addEventListener("click", toggleTranslation));
      document.querySelectorAll("#focus-mode-btn").forEach(btn => btn.addEventListener("click", toggleFocusMode));

      document.querySelectorAll(".pcast-chapters button").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.idx);
          seekTo(PC.episode.chapters[idx].start_time_seconds);
          PC.segmentEnd = null;
          if (a.paused) a.play().catch(() => {});
        });
      });
    }

    // ---------------- Eventos do <audio> (uma vez só) ----------------
    function setupAudioEvents() {
      const a = PC.audio;
      a.addEventListener("timeupdate", () => {
        if (!a.duration) return;
        const pct = (a.currentTime / a.duration) * 100;
        document.querySelectorAll("#pcast-slider").forEach(s => s.value = pct);
        document.querySelectorAll("#pcast-time-cur").forEach(el => el.textContent = fmtTime(a.currentTime));
        updateHighlight(a.currentTime);
        maybeCompleteEpisode();
        const now = Date.now();
        if (now - PC.lastLocalSave > 5000) { PC.lastLocalSave = now; saveLocalPosition(); }
        if (now - PC.lastRemoteSync > 20000) { PC.lastRemoteSync = now; Progress.syncPodcastNow(); }
      });
      a.addEventListener("play", () => {
        document.querySelectorAll(".btn-play").forEach(b => { b.classList.add("playing"); b.textContent = "⏸"; });
      });
      a.addEventListener("pause", () => {
        document.querySelectorAll(".btn-play").forEach(b => { b.classList.remove("playing"); b.textContent = "▶"; });
        saveLocalPosition();
        Progress.syncPodcastNow();
      });
      a.addEventListener("ended", () => {
        document.querySelectorAll(".btn-play").forEach(b => { b.classList.remove("playing"); b.textContent = "▶"; });
        saveLocalPosition();
        Progress.syncPodcastNow();
      });
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") { saveLocalPosition(); Progress.syncPodcastNow(); }
      });
      window.addEventListener("beforeunload", () => { saveLocalPosition(); Progress.syncPodcastNow(); });
    }

    // ---------------- Boot ----------------
    (async () => {
      document.getElementById("pcast-back-link").textContent = pui().back;
      if (!slug) { document.getElementById("content").innerHTML = `<p>${pui().missing}</p>`; return; }
      try {
        const catalog = await AFBData.podcastCatalog();
        PC.catalogEntry = (catalog.stories || []).find(s => s.slug === slug) || null;
        await loadEpisode(langParam);
      } catch (e) {
        document.getElementById("content").innerHTML = `<p>${pui().error}</p>`;
        return;
      }

      render();
      setupAudioEvents();
      setupMediaSession();

      // Retoma de onde parou (se já tinha posição salva e não terminou)
      const saved = loadSavedPosition();
      if (saved && saved.position > 5 && !saved.completed) {
        PC.audio.src = resolveAudioUrl();
        PC.audio.playbackRate = PC.speed;
        PC.audio.volume = PC.volume;
        PC.audio.currentTime = saved.position;
        document.querySelectorAll("#pcast-time-cur").forEach(el => el.textContent = fmtTime(saved.position));
        document.querySelectorAll("#pcast-slider").forEach(s => s.value = (saved.position / PC.episode.duration_seconds) * 100);
        updateHighlight(saved.position);
      }
    })();
  </script>
</body>
</html>
