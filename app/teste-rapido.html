<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Descubra em dois minutos um bom ponto de partida para estudar alemão no DeutschBloom."><title>Teste rápido de alemão | DeutschBloom</title><link rel="stylesheet" href="../assets/css/style.css"><style>
.test-wrap{max-width:780px;margin:auto;padding:38px 0 80px}.test-head{text-align:center}.test-head h1{font-size:clamp(2.3rem,6vw,4rem);line-height:1;margin:9px 0}.test-progress{height:7px;border-radius:99px;background:var(--border-light);overflow:hidden;margin:28px 0 18px}.test-progress i{display:block;height:100%;width:20%;background:linear-gradient(90deg,var(--color-primary),var(--color-accent));transition:.3s}.test-card{padding:clamp(22px,5vw,42px)}.test-card h2{font-size:clamp(1.35rem,3vw,2rem);line-height:1.3}.answers{display:grid;gap:10px;margin-top:22px}.answer{padding:14px 16px;border:1px solid var(--border-light);border-radius:13px;background:var(--card-bg);color:var(--text-primary);font:inherit;text-align:left;cursor:pointer}.answer:hover{border-color:var(--color-primary);transform:translateY(-1px)}.answer small{display:block;color:var(--text-secondary);margin-top:3px}.result-plan{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:22px 0}.result-plan a{padding:15px;border:1px solid var(--border-light);border-radius:13px;background:var(--bg-secondary);text-align:center}.result-plan b,.result-plan span{display:block}.result-plan span{font-size:.78rem;color:var(--text-secondary);margin-top:5px}@media(max-width:600px){.result-plan{grid-template-columns:1fr}.test-wrap{padding-top:22px}}
</style></head><body><div id="app-nav"></div><main class="container test-wrap"><header class="test-head"><span class="eyebrow">Seu primeiro caminho, sem pressão</span><h1>Teste rápido</h1><p class="muted">Em dois minutos, descubra por onde pode ser mais interessante começar.</p></header><div class="test-progress"><i id="bar"></i></div><section class="card test-card" id="test"></section></main><script src="../assets/js/theme.js"></script><script src="../assets/js/sfx.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/study-plan.js"></script><script src="../assets/js/nav.js"></script><script>
renderNav("teste-rapido");
const questions=[
 {q:"Qual é o seu principal objetivo com o alemão?",a:[{t:"Começar do zero",v:0,g:"zero"},{t:"Conversar no dia a dia",v:1,g:"conversation"},{t:"Trabalhar ou fazer entrevistas",v:2,g:"work"},{t:"Preparar uma prova Goethe",v:3,g:"goethe"}]},
 {q:"Quanto você já consegue compreender?",a:[{t:"Quase nada ainda",v:0},{t:"Palavras e frases bem simples",v:1},{t:"Conversas sobre assuntos conhecidos",v:3},{t:"Textos e conversas mais complexos",v:5}]},
 {q:"O que significa “Ich hätte gern einen Kaffee”?",a:[{t:"Eu gostaria de um café",v:2},{t:"Eu já tomei café",v:0},{t:"Eu preparo um café",v:0},{t:"Não sei",v:0}]},
 {q:"Complete: Gestern ___ ich nach Hause gegangen.",a:[{t:"bin",v:3},{t:"habe",v:0},{t:"werde",v:0},{t:"ist",v:0}]},
 {q:"Qual resposta parece mais natural para uma opinião?",a:[{t:"Meiner Meinung nach ist das eine gute Lösung.",v:5},{t:"Ich Meinung gute Lösung.",v:1},{t:"Meine meinen das gut.",v:0},{t:"Não sei",v:0}]},
 {q:"O que significa o verbo separável “aufstehen”?",a:[{t:"Levantar-se",v:2},{t:"Dormir",v:0},{t:"Sentar-se",v:0},{t:"Não sei",v:0}]},
 {q:"Complete: Ich gebe ___ Mann das Buch.",a:[{t:"dem",v:4},{t:"den",v:1},{t:"der",v:0},{t:"die",v:0}]},
 {q:"Qual frase está gramaticalmente correta?",a:[{t:"Ich kann gut Deutsch sprechen.",v:3},{t:"Ich kann Deutsch gut sprechen kann.",v:0},{t:"Gut ich kann sprechen Deutsch.",v:0},{t:"Não sei",v:0}]},
 {q:"Qual frase usa corretamente o Konjunktiv II (frase hipotética)?",a:[{t:"Wenn ich Zeit hätte, würde ich reisen.",v:6},{t:"Wenn ich Zeit habe, ich reise.",v:1},{t:"Ich hätte Zeit reisen.",v:0},{t:"Não sei",v:0}]},
 {q:"O que significa a expressão “die Daumen drücken”?",a:[{t:"Torcer por alguém / desejar sorte",v:5},{t:"Apertar os polegares literalmente",v:1},{t:"Bater na madeira",v:0},{t:"Não sei",v:0}]}
];let step=0,score=0,goal="general";const box=document.getElementById("test");
function shuffled(items){return [...items].sort(()=>Math.random()-.5)}
function render(){document.getElementById("bar").style.width=((step+1)/questions.length*100)+"%";const q=questions[step],answers=shuffled(q.a);box.innerHTML=`<span class="eyebrow">Pergunta ${step+1} de ${questions.length}</span><h2>${q.q}</h2><div class="answers">${answers.map((a,i)=>`<button class="answer" data-i="${i}">${a.t}</button>`).join("")}</div><p style="text-align:center;margin:18px 0 0"><a class="muted" href="../index.html#conteudos">Prefiro explorar livremente</a></p>`;box.onclick=e=>{const b=e.target.closest(".answer");if(!b)return;const a=answers[Number(b.dataset.i)];score+=a.v||0;if(a.g)goal=a.g;if(window.SFX)SFX.click();step++;step<questions.length?render():finish()}}
function finish(){const level=score<=4?"A1":score<=11?"A2":"B1";const starts=goal==="work"?[["💼","Profissões","profissoes.html"],["💡","Criatividade","criatividade.html"],["💬","Diálogos","cursos.html"]]:goal==="goethe"?[["📝","Simulado","simulado.html"],["⚡","Quiz","quiz.html"],["✍️","Escrita","escrita.html"]]:[["💬","Diálogos","cursos.html"],["⚡","Sessão rápida","sessao-rapida.html"],["🎤","Pronúncia","pronuncia.html"]];box.innerHTML=`<span class="eyebrow">Uma sugestão, não um rótulo</span><h2>Talvez você goste de começar pelo ${level}</h2><p class="muted">Pelas suas respostas e pelo seu objetivo, este parece um ponto de partida confortável. Você pode mudar de nível e explorar qualquer área quando quiser.</p><div class="result-plan">${starts.map(x=>`<a href="${x[2]}"><b>${x[0]} ${x[1]}</b><span>experimentar agora</span></a>`).join("")}</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn btn-primary" id="use">Usar esta recomendação</button><a class="btn btn-outline" href="../index.html#conteudos">Explorar livremente</a></div><p class="muted" style="text-align:center;margin-top:15px;font-size:.78rem">Este teste é uma orientação de estudo, não uma certificação oficial de nível.</p>`;document.getElementById("bar").style.width="100%";document.getElementById("use").onclick=()=>{StudyPlan.configure({goal,level,minutesPerDay:15,daysPerWeek:4,horizon:"3_months"});location.href=`cursos.html?nivel=${level}&tab=dialogos`}}
render();
</script></body></html>
